


<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تحدي طريق النيون السريع 🏎️⚡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #05020c;
    --neon-pink: #ff0055;
    --neon-blue: #00ffff;
    --neon-green: #39ff14;
    --neon-yellow: #ffea00;
  }

  * {
    box-sizing: border-box;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background-color: var(--bg-dark);
    font-family: 'Cairo', sans-serif;
    color: #fff;
  }

  #game-container {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
  }

  /* واجهة البيانات العلوية */
  #hud {
    position: absolute;
    top: 10px;
    width: 90%;
    display: flex;
    justify-content: space-between;
    z-index: 10;
    pointer-events: none;
  }

  .hud-box {
    background: rgba(15, 10, 44, 0.8);
    border: 1px solid var(--neon-blue);
    padding: 6px 16px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
  }

  .hud-label { font-size: 11px; opacity: 0.8; }
  .hud-val { font-family: 'Lalezar', sans-serif; font-size: 22px; color: var(--neon-blue); }

  /* مضمار السباق */
  #canvas-container {
    flex: 1;
    width: 100%;
    max-width: 480px;
    position: relative;
    background: #0d0a21;
    border-left: 3px solid var(--neon-pink);
    border-right: 3px solid var(--neon-pink);
    box-shadow: 0 0 30px rgba(255, 0, 85, 0.2);
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* أزرار التحكم باللمس */
  #controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    box-sizing: border-box;
    z-index: 15;
  }

  .ctrl-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--neon-blue);
    background: rgba(10, 5, 27, 0.8);
    color: var(--neon-blue);
    font-size: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
    cursor: pointer;
    transition: transform 0.1s, background-color 0.1s;
  }

  .ctrl-btn:active {
    transform: scale(0.9);
    background: var(--neon-blue);
    color: #000;
    box-shadow: 0 0 25px var(--neon-blue);
  }

  #btn-left { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }
  #btn-left:active { background: var(--neon-pink); color: #000; box-shadow: 0 0 25px var(--neon-pink); }

  /* شاشة البداية والنهاية */
  .screen {
    position: absolute;
    inset: 0;
    background: rgba(5, 2, 12, 0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    text-align: center;
    padding: 20px;
  }

  .title { font-family: 'Lalezar', sans-serif; font-size: 42px; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 10px; }
  .desc { font-size: 16px; opacity: 0.8; max-width: 320px; line-height: 1.6; margin-bottom: 30px; }

  .btn {
    font-family: 'Cairo', sans-serif;
    font-weight: bold;
    font-size: 18px;
    padding: 12px 40px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(180deg, var(--neon-green), #2dbd0f);
    color: #000;
    box-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
    cursor: pointer;
  }
  .btn:active { transform: translateY(2px); }
</style>
</head>
<body>

<div id="game-container">
  
  <!-- واجهة البيانات -->
  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">المسافة</div>
      <div class="hud-val" id="score-val">0 م</div>
    </div>
    <div class="hud-box">
      <div class="hud-label">السرعة</div>
      <div class="hud-val" id="speed-val">0 كم/س</div>
    </div>
  </div>

  <!-- ساحة اللعب (المضمار) -->
  <div id="canvas-container">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- أزرار التحكم الجانبية -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-left">◀</button>
    <button class="ctrl-btn" id="btn-right">▶</button>
  </div>

  <!-- شاشة البدء -->
  <div class="screen" id="start-screen">
    <h1 class="title">طريق النيون السريع 🏎️</h1>
    <p class="desc">تفادَ السيارات السريعة في هذا التحدي اللانهائي! استخدم الأزرار بالأسفل للتوجيه يميناً ويساراً.</p>
    <button class="btn" id="start-btn">بدء السباق 🏁</button>
  </div>

  <!-- شاشة الخسارة -->
  <div class="screen" id="over-screen" style="display: none;">
    <h1 class="title" style="color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink);">تحطمت السيارة! 💥</h1>
    <p class="desc" id="final-stats">لقد قطعت مسافة 0 متر بسرعة فائقة.</p>
    <button class="btn" id="restart-btn">حاول مجدداً 🔁</button>
  </div>

</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreVal = document.getElementById('score-val');
const speedVal = document.getElementById('speed-val');

// ضبط أبعاد الـ Canvas تلقائياً بناءً على حجم الشاشة لتناسب الهواتف والحواسب
function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// متغيرات حالة اللعبة
let gameActive = false;
let score = 0;
let gameSpeed = 5;
let baseSpeed = 5;
let maxSpeed = 15;
let player, obstacles, roadLines;
let keys = { left: false, right: false };

// فئات اللعبة (Classes)
class PlayerCar {
  constructor() {
    this.width = 45;
    this.height = 80;
    this.x = canvas.width / 2 - this.width / 2;
    this.y = canvas.height - this.height - 120; // رفعناها قليلاً لتكون فوق الأزرار تماماً
    this.speed = 6;
  }

  draw() {
    // رسم جسم السيارة (ستايل نيون رياضي)
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ffff';
    ctx.fillStyle = '#00ffff';
    ctx.fillRect(this.x, this.y, this.width, this.height);

    // زجاج أمامي وخلفي
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#111';
    ctx.fillRect(this.x + 5, this.y + 15, this.width - 10, 15);
    ctx.fillRect(this.x + 5, this.y + 55, this.width - 10, 10);

    // مصابيح نيون أمامية متوهجة
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#fff';
    ctx.fillStyle = '#fff';
    ctx.fillRect(this.x + 5, this.y - 2, 8, 4);
    ctx.fillRect(this.x + this.width - 13, this.y - 2, 8, 4);

    // إطارات
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#222';
    ctx.fillRect(this.x - 4, this.y + 10, 4, 15);
    ctx.fillRect(this.x + this.width, this.y + 10, 4, 15);
    ctx.fillRect(this.x - 4, this.y + 55, 4, 15);
    ctx.fillRect(this.x + this.width, this.y + 55, 4, 15);
  }

  update() {
    if (keys.left && this.x > 5) {
      this.x -= this.speed;
    }
    if (keys.right && this.x < canvas.width - this.width - 5) {
      this.x += this.speed;
    }
  }
}

class ObstacleCar {
  constructor() {
    this.width = 45;
    this.height = 80;
    // توزيع عشوائي على الحارات الثلاثة الافتراضية
    const lanes = [
      15, 
      canvas.width / 2 - this.width / 2, 
      canvas.width - this.width - 15
    ];
    this.x = lanes[Math.floor(Math.random() * lanes.length)];
    this.y = -this.height - Math.random() * 200;
    this.speed = Math.random() * 2 + 1; // سرعات متفاوتة للسيارات الأخرى
    
    // ألوان نيونية عشوائية للمنافسين
    const colors = ['#ff0055', '#39ff14', '#ffea00', '#ff00ff'];
    this.color = colors[Math.floor(Math.random() * colors.length)];
  }

  draw() {
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x, this.y, this.width, this.height);

    ctx.shadowBlur = 0;
    ctx.fillStyle = '#111';
    ctx.fillRect(this.x + 5, this.y + 15, this.width - 10, 15);
    ctx.fillRect(this.x + 5, this.y + 55, this.width - 10, 10);

    // أضواء خلفية حمراء
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff0000';
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(this.x + 5, this.y + this.height - 2, 8, 4);
    ctx.fillRect(this.x + this.width - 13, this.y + this.height - 2, 8, 4);
  }

  update() {
    this.y += gameSpeed - this.speed;
  }
}

// تهيئة وإعادة ضبط اللعبة
function initGame() {
  score = 0;
  gameSpeed = baseSpeed;
  player = new PlayerCar();
  obstacles = [];
  roadLines = [];
  
  // ملء خطوط الطريق الإرشادية
  for (let i = -50; i < canvas.height; i += 80) {
    roadLines.push({ y: i });
  }

  // إضافة أول دفعة من سيارات الخصوم
  spawnObstacle();
  spawnObstacle();
}

function spawnObstacle() {
  obstacles.push(new ObstacleCar());
}

// نظام كشف التصادم الدقيق
function checkCollision(rect1, rect2) {
  return rect1.x < rect2.x + rect2.width &&
         rect1.x + rect1.width > rect2.x &&
         rect1.y < rect2.y + rect2.height &&
         rect1.y + rect1.height > rect2.y;
}

// حلقة اللعبة الأساسية
function gameLoop() {
  if (!gameActive) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. رسم وتحديث خطوط الشارع لخلق شعور بالسرعة الفائقة
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
  ctx.setLineDash([40, 40]);
  ctx.lineWidth = 4;
  
  // الحارة اليسرى واليمنى
  ctx.beginPath();
  ctx.moveTo(canvas.width / 3, 0);
  ctx.lineTo(canvas.width / 3, canvas.height);
  ctx.moveTo((canvas.width / 3) * 2, 0);
  ctx.lineTo((canvas.width / 3) * 2, canvas.height);
  ctx.stroke();

  // تحريك وتحديث خطوط الشارع خلفياً
  roadLines.forEach(line => {
    line.y += gameSpeed;
    if (line.y > canvas.height) line.y = -80;
  });

  // 2. تحديث ورسم سيارة اللاعب
  player.update();
  player.draw();

  // 3. إدارة السيارات الأخرى (الخصوم المزعجين!)
  for (let i = obstacles.length - 1; i >= 0; i--) {
    let obs = obstacles[i];
    obs.update();
    obs.draw();

    // التحقق من التصادم
    if (checkCollision(player, obs)) {
      endGame();
      return;
    }

    // إزالة السيارة التي خرجت من أسفل الشاشة وتوليد سيارة بديلة
    if (obs.y > canvas.height) {
      obstacles.splice(i, 1);
      score += 10; // نقاط إضافية لتجاوز السيارات
      spawnObstacle();
    }
  }

  // زيادة عشوائية مستمرة وتوليد متناسب
  if (obstacles.length < 4 && Math.random() < 0.01) {
    spawnObstacle();
  }

  // زيادة السرعة وصعوبة القيادة تدريجياً مع المسافة
  score += 0.1;
  gameSpeed = baseSpeed + Math.floor(score / 150);
  if (gameSpeed > maxSpeed) gameSpeed = maxSpeed;

  // تحديث لوحة التحكم العلوية بالبيانات الحية
  scoreVal.textContent = Math.floor(score) + ' م';
  speedVal.textContent = Math.floor(gameSpeed * 15) + ' كم/س';

  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameActive = false;
  document.getElementById('final-stats').innerHTML = `لقد قطعت مسافة حماسية قدرها <strong>${Math.floor(score)} متر</strong> بسرعة قصوى!`;
  document.getElementById('over-screen').style.display = 'flex';
}

// ربط أزرار اللمس الشاشية الكبيرة (الهواتف)
const btnLeft = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');

// الحركات البرمجية للضغط واللمس المستمر
const setLeft = (val) => keys.left = val;
const setRight = (val) => keys.right = val;

btnLeft.addEventListener('mousedown', () => setLeft(true));
btnLeft.addEventListener('mouseup', () => setLeft(false));
btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); setLeft(true); });
btnLeft.addEventListener('touchend', () => setLeft(false));

btnRight.addEventListener('mousedown', () => setRight(true));
btnRight.addEventListener('mouseup', () => setRight(false));
btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); setRight(true); });
btnRight.addEventListener('touchend', () => setRight(false));

// دعم أزرار لوحة المفاتيح أيضاً (للحاسوب)
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = true;
  if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = true;
});
window.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = false;
  if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = false;
});

// تشغيل اللعبة وإعادتها
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  gameActive = true;
  initGame();
  gameLoop();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('over-screen').style.display = 'none';
  gameActive = true;
  initGame();
  gameLoop();
});
</script>
</body>
</html>
