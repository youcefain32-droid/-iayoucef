<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>منظم الوقت — جدولك الأسبوعي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B4B43;
    --ink-dark:#123430;
    --gold:#C9A227;
    --gold-soft:#E9D9A6;
    --rose:#B85C6D;
    --sky:#4A7C99;
    --sage:#6B8F71;
    --bg:#F5F4F0;
    --surface:#FFFFFF;
    --text:#2A2622;
    --muted:#8A8377;
    --border:#E2DDD0;
    --shadow: 0 4px 18px rgba(27,75,67,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Tajawal', sans-serif;
    background:
      radial-gradient(circle at 100% 0%, rgba(201,162,39,0.06), transparent 40%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:28px 20px 60px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:18px;
    margin-bottom:22px;
    padding-bottom:18px;
    border-bottom:1px solid var(--border);
  }
  .brand h1{
    font-family:'Aref Ruqaa', serif;
    font-weight:700;
    font-size:2.6rem;
    color:var(--ink);
    margin:0;
    line-height:1;
  }
  .brand p{
    margin:6px 2px 0;
    color:var(--muted);
    font-size:0.92rem;
    font-weight:400;
  }
  .weeknav{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .weeknav .range{
    font-weight:700;
    color:var(--ink-dark);
    font-size:0.98rem;
    min-width:170px;
    text-align:center;
  }
  button.nav-btn{
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--ink-dark);
    width:38px;height:38px;
    border-radius:10px;
    font-size:1rem;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:.15s;
  }
  button.nav-btn:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
  button.today-btn{
    border:1px solid var(--gold);
    background:#fff;
    color:#8a6d15;
    padding:0 16px;height:38px;
    border-radius:10px;
    font-weight:700;
    font-size:0.85rem;
    cursor:pointer;
    font-family:'Tajawal',sans-serif;
  }
  button.today-btn:hover{background:var(--gold);color:#fff;}

  /* ---------- Legend / filters ---------- */
  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:18px;
  }
  .chip{
    display:flex;
    align-items:center;
    gap:7px;
    padding:6px 12px;
    border-radius:999px;
    background:var(--surface);
    border:1px solid var(--border);
    font-size:0.82rem;
    cursor:pointer;
    user-select:none;
    transition:.15s;
    font-weight:500;
    color:var(--text);
  }
  .chip .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .chip.off{opacity:0.35;}
  .chip:hover{box-shadow:var(--shadow);}
  .add-task-cta{
    margin-inline-start:auto;
    background:var(--ink);
    color:#fff;
    border:none;
    padding:8px 18px;
    border-radius:999px;
    font-family:'Tajawal',sans-serif;
    font-weight:700;
    font-size:0.85rem;
    cursor:pointer;
    display:flex;align-items:center;gap:6px;
  }
  .add-task-cta:hover{background:var(--ink-dark);}

  /* ---------- Grid ---------- */
  .board{
    background:var(--surface);
    border-radius:18px;
    box-shadow:var(--shadow);
    overflow:hidden;
    border:1px solid var(--border);
  }
  .grid-scroll{
    overflow-x:auto;
    overflow-y:auto;
    max-height:640px;
  }
  .grid{
    display:grid;
    grid-template-columns: 64px repeat(7, minmax(128px,1fr));
    min-width:900px;
    position:relative;
  }
  .corner{
    position:sticky; top:0; right:0; z-index:5;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    border-left:1px solid var(--border);
  }
  .day-head{
    position:sticky; top:0; z-index:4;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    border-left:1px solid var(--border);
    text-align:center;
    padding:10px 4px 8px;
  }
  .day-head .dname{font-weight:700;font-size:0.86rem;color:var(--ink-dark);}
  .day-head .ddate{font-size:0.72rem;color:var(--muted);margin-top:2px;}
  .day-head.is-today .dname{color:var(--gold);}
  .day-head.is-today .ddate{
    background:var(--gold);color:#fff;border-radius:8px;padding:0 6px;display:inline-block;
  }
  .day-summary{
    font-size:0.66rem;color:var(--muted);margin-top:3px;
  }

  .time-col{
    border-left:1px solid var(--border);
    position:relative;
  }
  .time-cell{
    height:56px;
    text-align:center;
    font-size:0.68rem;
    color:var(--muted);
    position:relative;
    font-weight:500;
  }
  .time-cell span{
    position:absolute; top:-7px; right:0; left:0;
    background:var(--surface);
    padding:0 2px;
  }
  .time-cell::after{
    content:"";
    position:absolute; left:6px; top:0; width:4px;height:4px;
    border-radius:50%;
    background:var(--gold-soft);
  }

  .day-col{
    position:relative;
    border-left:1px solid var(--border);
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 55px, var(--border) 55px, var(--border) 56px);
  }
  .day-col.is-today{background-color: rgba(201,162,39,0.045);}
  .slot{
    height:56px;
    cursor:pointer;
  }
  .slot:hover{background:rgba(27,75,67,0.05);}

  .task{
    position:absolute;
    right:3px; left:3px;
    border-radius:8px;
    padding:5px 8px 4px;
    font-size:0.72rem;
    overflow:hidden;
    cursor:pointer;
    border-right:4px solid var(--ink);
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
    line-height:1.3;
    z-index:2;
  }
  .task b{display:block;font-size:0.76rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .task .t-time{opacity:0.75;font-size:0.66rem;}

  .now-line{
    position:absolute;right:0;left:0;height:0;
    border-top:2px solid var(--gold);
    z-index:3;
    pointer-events:none;
  }
  .now-line::before{
    content:"الآن";
    position:absolute; right:-4px; top:-9px;
    background:var(--gold);
    color:#fff;
    font-size:0.6rem;
    font-weight:700;
    padding:1px 6px;
    border-radius:999px;
  }
  .now-line::after{
    content:"";
    position:absolute; right:-3px; top:-4px;
    width:8px;height:8px;border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 0 3px rgba(201,162,39,0.25);
  }

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(20,30,28,0.45);
    display:none;
    align-items:center; justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--surface);
    border-radius:16px;
    padding:26px;
    width:100%; max-width:420px;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    max-height:90vh;
    overflow-y:auto;
  }
  .modal h2{
    font-family:'Aref Ruqaa',serif;
    color:var(--ink);
    margin:0 0 16px;
    font-size:1.5rem;
  }
  .field{margin-bottom:14px;}
  .field label{
    display:block; font-size:0.78rem; font-weight:700; color:var(--ink-dark);
    margin-bottom:5px;
  }
  .field input[type=text], .field input[type=time], .field select, .field textarea{
    width:100%;
    padding:9px 11px;
    border:1px solid var(--border);
    border-radius:9px;
    font-family:'Tajawal',sans-serif;
    font-size:0.88rem;
    background:#fbfaf8;
    color:var(--text);
  }
  .field textarea{resize:vertical;min-height:54px;}
  .row2{display:flex;gap:10px;}
  .row2 .field{flex:1;}
  .cat-options{display:flex;gap:8px;flex-wrap:wrap;}
  .cat-opt{
    display:flex;align-items:center;gap:6px;
    border:1.5px solid var(--border);
    padding:6px 10px;border-radius:999px;
    cursor:pointer;font-size:0.78rem;font-weight:500;
  }
  .cat-opt input{display:none;}
  .cat-opt .dot{width:9px;height:9px;border-radius:50%;}
  .cat-opt.selected{border-color:currentColor;background:rgba(0,0,0,0.03);}
  .modal-actions{
    display:flex;gap:8px;margin-top:20px;
    justify-content:space-between;
  }
  .btn{
    padding:10px 16px;border-radius:10px;border:none;
    font-family:'Tajawal',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;
  }
  .btn-primary{background:var(--ink);color:#fff;flex:1;}
  .btn-primary:hover{background:var(--ink-dark);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .btn-ghost:hover{background:#f0eee8;}
  .btn-danger{background:#fff;color:var(--rose);border:1px solid var(--rose);}
  .btn-danger:hover{background:var(--rose);color:#fff;}
  .err{color:var(--rose);font-size:0.76rem;margin-top:-6px;margin-bottom:10px;display:none;}

  .status{
    text-align:center;color:var(--muted);font-size:0.8rem;padding:40px 0;
  }

  footer.note{
    text-align:center;margin-top:16px;color:var(--muted);font-size:0.75rem;
  }

  @media (max-width:640px){
    .brand h1{font-size:2rem;}
    header{flex-direction:column;align-items:flex-start;}
    .grid-scroll{max-height:520px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <h1>منظم الوقت</h1>
      <p>جدولك الأسبوعي، مرسوم بعناية</p>
    </div>
    <div class="weeknav">
      <button class="nav-btn" id="prevWeek" title="الأسبوع السابق">▶</button>
      <div class="range" id="weekRange">—</div>
      <button class="nav-btn" id="nextWeek" title="الأسبوع التالي">◀</button>
      <button class="today-btn" id="gotoToday">هذا الأسبوع</button>
    </div>
  </header>

  <div class="legend" id="legend">
    <!-- category chips injected -->
    <button class="add-task-cta" id="openAddBtn">＋ إضافة مهمة</button>
  </div>

  <div class="board">
    <div class="grid-scroll">
      <div class="grid" id="grid">
        <div class="status" id="loadingStatus" style="grid-column:1/-1;">جارِ تحميل جدولك…</div>
      </div>
    </div>
  </div>

  <footer class="note">تُحفظ بياناتك تلقائياً في هذا التطبيق. اضغط على أي خانة فارغة لإضافة مهمة جديدة.</footer>
</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">مهمة جديدة</h2>
    <div class="field">
      <label>عنوان المهمة</label>
      <input type="text" id="f-title" placeholder="مثال: اجتماع الفريق">
      <div class="err" id="err-title">الرجاء إدخال عنوان للمهمة</div>
    </div>
    <div class="field">
      <label>اليوم</label>
      <select id="f-day"></select>
    </div>
    <div class="row2">
      <div class="field">
        <label>من الساعة</label>
        <input type="time" id="f-start" step="1800">
      </div>
      <div class="field">
        <label>إلى الساعة</label>
        <input type="time" id="f-end" step="1800">
      </div>
    </div>
    <div class="err" id="err-time">وقت النهاية يجب أن يكون بعد وقت البداية</div>
    <div class="field">
      <label>التصنيف</label>
      <div class="cat-options" id="catOptions"></div>
    </div>
    <div class="field">
      <label>ملاحظات (اختياري)</label>
      <textarea id="f-notes" placeholder="تفاصيل إضافية…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="deleteBtn" style="display:none;">حذف</button>
      <button class="btn btn-ghost" id="cancelBtn">إلغاء</button>
      <button class="btn btn-primary" id="saveBtn">حفظ</button>
    </div>
  </div>
</div>

<script>
(function(){
  const DAY_NAMES = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
  const CATS = [
    {id:'work', label:'عمل', color:'#1B4B43'},
    {id:'study', label:'دراسة', color:'#4A7C99'},
    {id:'personal', label:'شخصي', color:'#B85C6D'},
    {id:'health', label:'صحة', color:'#6B8F71'},
    {id:'other', label:'أخرى', color:'#C9A227'},
  ];
  const DAY_START = 6;   // 06:00
  const DAY_END = 24;    // 24:00
  const ROW_H = 56;      // px per hour
  const STORAGE_KEY = 'weekly-tasks-v1';

  let tasks = [];
  let weekOffset = 0;
  let activeFilters = new Set(CATS.map(c=>c.id));
  let editingId = null;
  let pendingSlot = null; // {dayIdx, minutes}

  const gridEl = document.getElementById('grid');
  const legendEl = document.getElementById('legend');
  const weekRangeEl = document.getElementById('weekRange');
  const overlay = document.getElementById('overlay');

  function uid(){ return 't_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

  function catById(id){ return CATS.find(c=>c.id===id) || CATS[4]; }

  function pad(n){ return n.toString().padStart(2,'0'); }

  function minutesToLabel(m){
    let h = Math.floor(m/60), mm = m%60;
    return pad(h)+':'+pad(mm);
  }
  function labelToMinutes(str){
    const [h,m] = str.split(':').map(Number);
    return h*60+m;
  }

  // ---------- Week date math ----------
  function getWeekStart(offset){
    const now = new Date();
    const day = now.getDay(); // 0 = Sunday
    const start = new Date(now);
    start.setHours(0,0,0,0);
    start.setDate(now.getDate() - day + offset*7);
    return start;
  }
  function fmtDate(d){
    return d.toLocaleDateString('ar-SA-u-nu-latn', {day:'numeric', month:'short'});
  }
  function isSameDate(a,b){
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }

  // ---------- Storage ----------
  async function loadTasks(){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        tasks = JSON.parse(res.value);
      } else {
        tasks = seedTasks();
        await persist();
      }
    }catch(e){
      tasks = seedTasks();
      try{ await persist(); }catch(e2){ console.error('save failed', e2); }
    }
    render();
  }
  async function persist(){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(tasks), false);
    }catch(e){
      console.error('Storage error:', e);
    }
  }
  function seedTasks(){
    const today = new Date().getDay();
    return [
      {id:uid(), day: today, start: 9*60, end: 10*60+30, title:'مراجعة الجدول', category:'other', notes:'تعرّف على واجهة التطبيق'},
      {id:uid(), day: (today+1)%7, start: 14*60, end: 15*60, title:'اجتماع فريق', category:'work', notes:''},
      {id:uid(), day: (today+2)%7, start: 18*60, end: 19*60, title:'رياضة', category:'health', notes:''},
    ];
  }

  // ---------- Rendering ----------
  function renderLegend(){
    legendEl.querySelectorAll('.chip').forEach(c=>c.remove());
    CATS.forEach(cat=>{
      const chip = document.createElement('button');
      chip.className = 'chip' + (activeFilters.has(cat.id) ? '' : ' off');
      chip.style.color = cat.color;
      chip.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${cat.label}`;
      chip.onclick = ()=>{
        if(activeFilters.has(cat.id)) activeFilters.delete(cat.id);
        else activeFilters.add(cat.id);
        renderLegend();
        renderGrid();
      };
      legendEl.insertBefore(chip, document.getElementById('openAddBtn'));
    });
  }

  function renderWeekRange(){
    const start = getWeekStart(weekOffset);
    const end = new Date(start); end.setDate(start.getDate()+6);
    weekRangeEl.textContent = fmtDate(start) + '  —  ' + fmtDate(end);
  }

  function renderGrid(){
    gridEl.innerHTML = '';
    const weekStart = getWeekStart(weekOffset);
    const now = new Date();

    // corner
    const corner = document.createElement('div');
    corner.className = 'corner';
    gridEl.appendChild(corner);

    const dayDates = [];
    for(let i=0;i<7;i++){
      const d = new Date(weekStart); d.setDate(weekStart.getDate()+i);
      dayDates.push(d);
      const isToday = isSameDate(d, now);
      const head = document.createElement('div');
      head.className = 'day-head' + (isToday ? ' is-today' : '');
      const dayTasks = tasks.filter(t=>t.day===i && activeFilters.has(t.category));
      const totalMins = dayTasks.reduce((s,t)=>s+(t.end-t.start),0);
      const hrs = (totalMins/60);
      head.innerHTML = `<div class="dname">${DAY_NAMES[i]}</div>
        <div class="ddate">${fmtDate(d)}</div>
        <div class="day-summary">${dayTasks.length} مهام • ${hrs.toFixed(1)} س</div>`;
      gridEl.appendChild(head);
    }

    // time column
    const timeCol = document.createElement('div');
    timeCol.className = 'time-col';
    for(let h=DAY_START; h<DAY_END; h++){
      const cell = document.createElement('div');
      cell.className = 'time-cell';
      cell.innerHTML = `<span>${pad(h)}:00</span>`;
      timeCol.appendChild(cell);
    }
    gridEl.appendChild(timeCol);

    // day columns
    for(let i=0;i<7;i++){
      const d = dayDates[i];
      const isToday = isSameDate(d, now);
      const col = document.createElement('div');
      col.className = 'day-col' + (isToday ? ' is-today' : '');
      col.style.height = ((DAY_END-DAY_START)*ROW_H) + 'px';

      for(let h=DAY_START; h<DAY_END; h++){
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.addEventListener('click', ()=> openModalForSlot(i, h*60));
        col.appendChild(slot);
      }

      // tasks
      tasks.filter(t=>t.day===i && activeFilters.has(t.category)).forEach(t=>{
        const cat = catById(t.category);
        const top = (t.start - DAY_START*60) / 60 * ROW_H;
        const height = Math.max((t.end - t.start)/60 * ROW_H - 2, 20);
        const el = document.createElement('div');
        el.className = 'task';
        el.style.top = top+'px';
        el.style.height = height+'px';
        el.style.background = cat.color + '1c';
        el.style.color = cat.color;
        el.style.borderColor = cat.color;
        el.innerHTML = `<b>${escapeHtml(t.title)}</b><span class="t-time">${minutesToLabel(t.start)} – ${minutesToLabel(t.end)}</span>`;
        el.addEventListener('click', (e)=>{ e.stopPropagation(); openModalForEdit(t); });
        col.appendChild(el);
      });

      // now line
      if(isToday){
        const nowMin = now.getHours()*60 + now.getMinutes();
        if(nowMin >= DAY_START*60 && nowMin <= DAY_END*60){
          const line = document.createElement('div');
          line.className = 'now-line';
          line.style.top = ((nowMin - DAY_START*60)/60*ROW_H) + 'px';
          col.appendChild(line);
        }
      }

      gridEl.appendChild(col);
    }
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render(){
    renderLegend();
    renderWeekRange();
    renderGrid();
  }

  // ---------- Modal ----------
  const daySelect = document.getElementById('f-day');
  DAY_NAMES.forEach((name, idx)=>{
    const opt = document.createElement('option');
    opt.value = idx; opt.textContent = name;
    daySelect.appendChild(opt);
  });

  const catOptionsEl = document.getElementById('catOptions');
  let selectedCat = CATS[0].id;
  function renderCatOptions(){
    catOptionsEl.innerHTML = '';
    CATS.forEach(cat=>{
      const label = document.createElement('label');
      label.className = 'cat-opt' + (selectedCat===cat.id ? ' selected' : '');
      label.style.color = cat.color;
      label.innerHTML = `<input type="radio" name="cat" value="${cat.id}"><span class="dot" style="background:${cat.color}"></span>${cat.label}`;
      label.querySelector('input').checked = selectedCat===cat.id;
      label.querySelector('input').addEventListener('change', ()=>{
        selectedCat = cat.id;
        renderCatOptions();
      });
      catOptionsEl.appendChild(label);
    });
  }

  function openModalForSlot(dayIdx, minutes){
    editingId = null;
    pendingSlot = {dayIdx, minutes};
    document.getElementById('modalTitle').textContent = 'مهمة جديدة';
    document.getElementById('f-title').value = '';
    document.getElementById('f-notes').value = '';
    daySelect.value = dayIdx;
    document.getElementById('f-start').value = minutesToLabel(minutes);
    document.getElementById('f-end').value = minutesToLabel(Math.min(minutes+60, DAY_END*60));
    selectedCat = CATS[0].id;
    renderCatOptions();
    document.getElementById('deleteBtn').style.display = 'none';
    hideErrors();
    overlay.classList.add('show');
  }

  function openModalForEdit(task){
    editingId = task.id;
    pendingSlot = null;
    document.getElementById('modalTitle').textContent = 'تعديل المهمة';
    document.getElementById('f-title').value = task.title;
    document.getElementById('f-notes').value = task.notes || '';
    daySelect.value = task.day;
    document.getElementById('f-start').value = minutesToLabel(task.start);
    document.getElementById('f-end').value = minutesToLabel(task.end);
    selectedCat = task.category;
    renderCatOptions();
    document.getElementById('deleteBtn').style.display = 'inline-block';
    hideErrors();
    overlay.classList.add('show');
  }

  function closeModal(){
    overlay.classList.remove('show');
    editingId = null; pendingSlot = null;
  }

  function hideErrors(){
    document.getElementById('err-title').style.display = 'none';
    document.getElementById('err-time').style.display = 'none';
  }

  document.getElementById('openAddBtn').addEventListener('click', ()=>{
    const now = new Date();
    let mins = Math.round((now.getHours()*60+now.getMinutes())/30)*30;
    if(mins < DAY_START*60) mins = DAY_START*60;
    if(mins > (DAY_END-1)*60) mins = (DAY_END-1)*60;
    openModalForSlot(now.getDay(), mins);
  });
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeModal(); });

  document.getElementById('saveBtn').addEventListener('click', async ()=>{
    hideErrors();
    const title = document.getElementById('f-title').value.trim();
    const day = Number(daySelect.value);
    const start = labelToMinutes(document.getElementById('f-start').value);
    const end = labelToMinutes(document.getElementById('f-end').value);
    let valid = true;
    if(!title){ document.getElementById('err-title').style.display='block'; valid = false; }
    if(end <= start){ document.getElementById('err-time').style.display='block'; valid = false; }
    if(!valid) return;

    const notes = document.getElementById('f-notes').value.trim();

    if(editingId){
      const t = tasks.find(x=>x.id===editingId);
      if(t){ t.title=title; t.day=day; t.start=start; t.end=end; t.category=selectedCat; t.notes=notes; }
    } else {
      tasks.push({id:uid(), day, start, end, title, category:selectedCat, notes});
    }
    await persist();
    render();
    closeModal();
  });

  document.getElementById('deleteBtn').addEventListener('click', async ()=>{
    if(editingId){
      tasks = tasks.filter(t=>t.id!==editingId);
      await persist();
      render();
    }
    closeModal();
  });

  // ---------- Week nav ----------
  document.getElementById('prevWeek').addEventListener('click', ()=>{ weekOffset--; render(); });
  document.getElementById('nextWeek').addEventListener('click', ()=>{ weekOffset++; render(); });
  document.getElementById('gotoToday').addEventListener('click', ()=>{ weekOffset=0; render(); });

  // refresh now-line every minute
  setInterval(()=>{ if(weekOffset===0) renderGrid(); }, 60000);

  loadTasks();
})();
</script>
</body>
</html>
